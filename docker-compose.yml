version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsa_visualizer_backend
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/dsa_visualizer
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=${CLIENT_URL:-http://localhost:80}
    depends_on:
      - mongodb
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dsa_visualizer_frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend

  mongodb:
    image: mongo:7.0
    container_name: dsa_visualizer_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: dsa_visualizer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
