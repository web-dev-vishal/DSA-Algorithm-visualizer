<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>AlgoViz Pro — AI-Powered Algorithm Visualizer & DSA Platform</title>
    <meta name="description" content="AlgoViz Pro is the AI-powered algorithm visualizer for engineers, students, and educators. Step-by-step animations, Big-O analysis, bug detection, and team collaboration — all in one platform." />
    <meta name="keywords" content="algorithm visualizer, DSA, data structures, algorithms, Big-O, complexity analysis, sorting visualizer, binary search, interview prep, coding education" />
    <meta name="author" content="AlgoViz Pro" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://algoviz.pro" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://algoviz.pro" />
    <meta property="og:title" content="AlgoViz Pro — Visualize Algorithms with AI" />
    <meta property="og:description" content="Paste any DSA code and get instant AI-powered analysis, step-by-step visualization, and Big-O complexity — in seconds." />
    <meta property="og:image" content="https://algoviz.pro/og-image.png" />
    <meta property="og:site_name" content="AlgoViz Pro" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@algovizpro" />
    <meta name="twitter:title" content="AlgoViz Pro — Visualize Algorithms with AI" />
    <meta name="twitter:description" content="AI-powered DSA algorithm visualizer. Step-by-step animations, Big-O analysis, bug detection." />
    <meta name="twitter:image" content="https://algoviz.pro/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light dark" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Performance hints -->
    <link rel="dns-prefetch" href="https://api.groq.com" />
    <link rel="dns-prefetch" href="https://api.dicebear.com" />

    <!-- Inline dark-mode flash prevention -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('algviz_dark');
          var dark = stored !== null ? stored === '1' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
